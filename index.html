<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès PDF</title>
<meta name="google-site-verification" content="v1n-U1ZbQ_z94Hxt0NyvesUKsW1mK5yBPT3q6O8in4c" />
<style>
body{font-family:Arial;background:#f4f4f4;padding:10px;margin:0;}
.box{width:95%;max-width:600px;margin:20px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
button{padding:10px;width:100%;margin-top:10px;cursor:pointer;border:none;border-radius:8px;font-size:16px;}
input{width:100%;padding:10px;margin-top:10px;box-sizing:border-box;border-radius:8px;border:1px solid #ccc;font-size:16px;}
#topcode{position:fixed;top:10px;right:10px;background:black;color:white;padding:10px;border-radius:10px;display:none;z-index:999;font-size:14px;}
#timer{position:fixed;top:60px;right:10px;background:red;color:white;padding:10px;border-radius:10px;display:none;z-index:999;font-size:14px;}
</style>
</head>
<body>

<div id="topcode"></div>
<div id="timer"></div>

<!-- 📘 SITE DIRECT -->
<div class="box" id="siteBox">
<h2>📘 Accès PDF</h2>
<h3>💰 Paiement Orange Money</h3>
<p style="background:#fff3cd; padding:10px; border-radius:8px;">
📌 Composez : <b>*144*10*44295613*300#</b><br><br>
Puis revenez cliquer sur <b>✔ J’ai payé</b> pour recevoir votre code.
</p>
<button id="payBtn" onclick="payer()">✔ J’ai payé</button>
<hr>
<h3>🔑 Entrer code</h3>
<input id="code" placeholder="Code reçu">
<button onclick="verifier()">Accéder PDF</button>
</div>

<script>
//////////////////////////////////////////////////
// CONFIG SUPABASE
//////////////////////////////////////////////////
const SUPABASE_URL = "https://gkqlmpkmzfvurkzgrjlm.supabase.co";
const SUPABASE_KEY = "sb_publishable_TpKfbr8y19-DzT9dQvlr5Q_2MR-ciXr";

//////////////////////////////////////////////////
// VARIABLES & SECURE ID
//////////////////////////////////////////////////
let countdown;
let checkInterval;
let essais = 0;
let timerStarted = false;
let derniereVerification = "";

function genererIdentifiantSecours() {
    return 'dev-' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
}

function obtenirAppareilID() {
    let id = localStorage.getItem("appareilID");
    if (!id) {
        try {
            id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : genererIdentifiantSecours();
        } catch (e) {
            id = genererIdentifiantSecours();
        }
        localStorage.setItem("appareilID", id);
    }
    return id;
}

let appareilID = obtenirAppareilID();

//////////////////////////////////////////////////
// 🔄 CHARGEMENT AUTOMATIQUE (SANS LOGIN)
//////////////////////////////////////////////////
window.onload = function(){
    restaurerCode();
    surveillerConfirmation();
}

//////////////////////////////////////////////////
// 🔄 RESTAURER CODE DEPUIS SUPABASE (PAR APPAREIL)
//////////////////////////////////////////////////
async function restaurerCode(){
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/payments?device_id=eq.${appareilID}&status=eq.confirmé&select=*`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await res.json();
    if(!data || data.length===0) return;

    const p = data[data.length - 1];

    if(new Date(p.expires_at) > new Date()){
        document.getElementById("topcode").style.display="block";
        document.getElementById("topcode").innerHTML = "🔑 Code actif : " + p.code;
        document.getElementById("code").value = p.code;

        if(!timerStarted){
            startTimer(p.expires_at);
            timerStarted = true;
        }
    }
}

//////////////////////////////////////////////////
// 💰 INITIALISER UN PAIEMENT (LOCKED SUR L'APPAREIL)
//////////////////////////////////////////////////
async function payer(){
    document.getElementById("payBtn").disabled = true;

    const check = await fetch(
        `${SUPABASE_URL}/rest/v1/payments?device_id=eq.${appareilID}&status=eq.en attente`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const oldData = await check.json();

    if(oldData.length > 0){
        alert("Paiement déjà envoyé ⏳");
        document.getElementById("payBtn").disabled = false;
        return;
    }

    await fetch(
        `${SUPABASE_URL}/rest/v1/payments`,
        {
            method:"POST",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                device_id: appareilID,
                status:"en attente",
                created_at: new Date().toISOString()
            })
        }
    );

    alert("Paiement envoyé ✔");
    document.getElementById("payBtn").disabled = false;
}

//////////////////////////////////////////////////
// 🔄 SURVEILLER CONFIRMATION DE PAIEMENT
//////////////////////////////////////////////////
function surveillerConfirmation(){
    clearInterval(checkInterval);

    checkInterval = setInterval(async ()=>{
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/payments?device_id=eq.${appareilID}&status=eq.confirmé&select=*`,
            {
                headers:{
                    apikey:SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await res.json();
        if(!data || data.length===0) return;

        const p = data[data.length - 1];

        if(new Date(p.expires_at) < new Date()){
            document.getElementById("topcode").style.display="none";
            document.getElementById("code").value="";
            return;
        }

        if(derniereVerification === p.code) return;
        derniereVerification = p.code;

        document.getElementById("topcode").style.display="block";
        document.getElementById("topcode").innerHTML = "🔑 Code actif : " + p.code;
        document.getElementById("code").value = p.code;

        if(!timerStarted){
            startTimer(p.expires_at);
            timerStarted = true;
        }

    }, 10000);
}

//////////////////////////////////////////////////
// 🔑 VERIFIER LE CODE ENTRÉ PAR L'UTILISATEUR
//////////////////////////////////////////////////
async function verifier(){
    if(essais >= 5){
        alert("Trop de tentatives ❌");
        return;
    }

    const code = document.getElementById("code").value.trim();

    // Recherche de la ligne confirmée correspondant à ce code ET à cet appareil
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/payments?device_id=eq.${appareilID}&code=eq.${code}&status=eq.confirmé`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await res.json();

    if(!data || data.length===0){
        essais++;
        alert("Code invalide ❌");
        return;
    }

    const p = data[0];

    if(new Date(p.expires_at) < new Date()){
        alert("Code expiré ❌");
        document.getElementById("code").value="";
        return;
    }

    essais = 0;

    startTimer(p.expires_at);
    alert("Accès autorisé ✔");

    document.getElementById("topcode").style.display="block";
    document.getElementById("topcode").innerHTML = "🔑 Code actif : " + p.code;

    ouvrirPdfProtege(p.expires_at);

    const oldBtn2 = document.querySelector(".downloadBtn");
    if(oldBtn2){ oldBtn2.remove(); }

    setTimeout(()=>{
        const btn = document.createElement("button");
        btn.className = "downloadBtn";
        btn.innerText = "⬇ Télécharger PDF";

        btn.style.position="fixed";
        btn.style.bottom="20px";
        btn.style.left="50%";
        btn.style.transform= "translateX(-50%)";
        btn.style.padding="15px";
        btn.style.background="green";
        btn.style.color="white";
        btn.style.border="none";
        btn.style.borderRadius="10px";
        btn.style.zIndex="9999";

        btn.onclick = ()=>{
            if(new Date(p.expires_at) < new Date()){
                alert("Code expiré ❌");
                btn.remove();
                return;
            }

            const a = document.createElement("a");
            a.href = "formation2026.pdf?nocache=" + Date.now();
            a.download = "formation2026.pdf";
            a.click();
        }; 

        document.body.appendChild(btn);
    }, 1000);
} 

//////////////////////////////////////////////////
// 🔒 OUVERTURE DU PDF
//////////////////////////////////////////////////
function ouvrirPdfProtege(expireDate){
    if(new Date(expireDate) < new Date()){
        alert("Code expiré ❌");
        return;
    }
    window.open("formation2026.pdf?nocache=" + Date.now(), "_blank");
}

//////////////////////////////////////////////////
// ⏳ GESTIONNAIRE DU COMPTE À REBOURS
//////////////////////////////////////////////////
function startTimer(expireDate){
    clearInterval(countdown);
    const exp = new Date(expireDate);

    document.getElementById("timer").style.display="block";

    countdown = setInterval(()=>{
        const diff = exp - new Date();

        if(diff <= 0){
            document.getElementById("timer").innerHTML = "❌ Code expiré";
            document.getElementById("topcode").style.display="none";
            document.getElementById("code").value="";
            
            const oldBtn3 = document.querySelector(".downloadBtn");
            if(oldBtn3){ oldBtn3.remove(); }
            
            timerStarted = false;
            clearInterval(countdown);
            return;
        }

        const h = Math.floor(diff/3600000);
        const m = Math.floor((diff%3600000)/60000);
        const s = Math.floor((diff%60000)/1000);

        document.getElementById("timer").innerHTML = "⏳ Expire dans " + h + "h " + m + "m " + s + "s";
    }, 1000);
}
</script>

</body>
</html>
