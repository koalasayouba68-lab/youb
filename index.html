<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accès PDF</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px;
width:100%;
margin-top:10px;
}

#topcode{
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:10px;
border-radius:10px;
display:none;
}

#timer{
position:fixed;
top:60px;
right:10px;
background:red;
color:white;
padding:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div id="topcode"></div>
<div id="timer"></div>

<div class="box">

<h2>📘 Accès PDF</h2>

<h3>💰 Paiement Orange Money</h3>

<p style="background:#fff3cd;padding:10px;border-radius:8px;">
📌 Composez : <b>*144*10*44295613*300#</b><br><br>
Puis revenez cliquer sur <b>✔ J’ai payé</b> pour recevoir votre code.
</p>

<button onclick="payer()">✔ J’ai payé</button>

<hr>

<h3>🔑 Entrer code</h3>

<input id="code" placeholder="Code reçu" style="width:100%;padding:10px;">
<button onclick="verifier()">Accéder PDF</button>

</div>

<script>

const SUPABASE_URL = "https://gkqlmpkmzfvurkzgrjlm.supabase.co";
const SUPABASE_KEY = "sb_publishable_TpKfbr8y19-DzT9dQvlr5Q_2MR-ciXr";

let countdown;

// 💰 PAYER
async function payer(){

const phone = prompt("Ton numéro Orange Money");
if(!phone) return;

localStorage.setItem("phone", phone);

await fetch(`${SUPABASE_URL}/rest/v1/payments`,{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
status:"en attente",
created_at:new Date().toISOString()
})
});

alert("Paiement envoyé ✔");
}

// 🔑 VERIFIER + DOWNLOAD
async function verifier(){

const code = document.getElementById("code").value;
const phone = localStorage.getItem("phone");

const res = await fetch(`${SUPABASE_URL}/rest/v1/payments?phone=eq.${phone}&code=eq.${code}`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data = await res.json();

if(!data || data.length === 0){
alert("Code invalide ❌");
return;
}

const p = data[0];
const now = new Date();
const exp = new Date(p.expires_at);

if(p.status === "confirmé" && exp > now){

alert("Accès autorisé ✔ Téléchargement...");

// DOWNLOAD PDF
const a = document.createElement("a");
a.href = "monpdf.pdf";
a.download = "monpdf.pdf";
a.click();

}else{
alert("Code expiré ou non confirmé ❌");
}
}

// 🔥 LIVE CODE + TIMER
async function checkLive(){

const phone = localStorage.getItem("phone");
if(!phone) return;

const res = await fetch(`${SUPABASE_URL}/rest/v1/payments?phone=eq.${phone}`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const data = await res.json();

const confirmed = data.filter(p => p.status === "confirmé");

if(confirmed.length === 0){
document.getElementById("topcode").style.display="none";
document.getElementById("timer").style.display="none";
return;
}

const p = confirmed[confirmed.length - 1];

const now = new Date();
const exp = new Date(p.expires_at);

if(exp > now){

// CODE
document.getElementById("topcode").style.display="block";
document.getElementById("topcode").innerHTML =
"🔑 Code actif : " + p.code;

// TIMER
document.getElementById("timer").style.display="block";

clearInterval(countdown);

countdown = setInterval(()=>{

const diff = exp - new Date();

if(diff <= 0){
document.getElementById("timer").innerHTML = "❌ Code expiré";
clearInterval(countdown);
return;
}

const m = Math.floor(diff / 60000);
const s = Math.floor((diff % 60000) / 1000);

document.getElementById("timer").innerHTML =
"⏳ Expire dans " + m + "m " + s + "s";

},1000);

}else{
document.getElementById("topcode").style.display="none";
document.getElementById("timer").style.display="none";
}
}

setInterval(checkLive,5000);

</script>

</body>
</html>
